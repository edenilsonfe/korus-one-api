# Worker ARQ — deploy com: railway up --service worker
# (api usa o railway.toml principal; este arquivo é o manifesto ao fazer up do worker)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "arq worker.WorkerSettings"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
